name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull, build JAR, restart on EC2
        uses: appleboy/ssh-action@v1.2.2
        env:
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          envs: EC2_APP_DIR
          script: |
            set -euo pipefail
            if [ -z "${EC2_APP_DIR:-}" ]; then
              echo "EC2_APP_DIR secret is not set"
              exit 1
            fi
            cd "$EC2_APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            chmod +x gradlew
            ./gradlew bootJar -x test --no-daemon
            bash scripts/deploy/restart.sh

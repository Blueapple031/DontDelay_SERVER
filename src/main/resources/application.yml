spring:
  datasource:
    url: jdbc:h2:file:./data/dontdelay-db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

exam:
  generator:
    enabled: true
  max-upload-bytes: 52428800
  rate-limit-upload-per-hour: 10
  chunk-size: 800
  chunk-overlap: 120
  min-chunk-size: 100
  embedding-dimensions: 1536
  ocr:
    enabled: ${OCR_ENABLED:true}
    min-chars-per-page: 50
  storage:
    type: local
    local-base-path: ./data/exam-storage

openai:
  api-key: ${OPENAI_API_KEY:}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

upstage:
  api-key: ${UPSTAGE_API_KEY:}
  base-url: ${UPSTAGE_BASE_URL:https://api.upstage.ai}

aws:
  region: ap-northeast-2
  s3:
    bucket: dontdelay-exam
    presigned-url-ttl-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: jdbc:h2:mem:dontdelay
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

exam:
  generator:
    enabled: true
  max-upload-bytes: 52428800
  rate-limit-upload-per-hour: 10
  storage:
    type: s3
aws:
  region: ap-northeast-2
  s3:
    bucket: dontdelay-exam
    presigned-url-ttl-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
